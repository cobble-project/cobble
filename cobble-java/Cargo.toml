[package]
name = "cobble-java"
version = "0.0.1"
edition = "2024"

[lib]
name = "cobblejni"
crate-type = ["cdylib", "rlib"]

[dependencies]
cobble = { path = "../cobble" }
cobble-data-structure = { path = "../cobble-data-structure" }
bytes = "1"
jni = "0.21"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
