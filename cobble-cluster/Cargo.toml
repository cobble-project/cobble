[package]
name = "cobble-cluster"
version = "0.0.1"
edition = "2024"

[dependencies]
cobble = { path = "../cobble" }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.143"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "net", "io-util", "sync", "time"] }
uuid = { version = "1.18.0", features = ["v4"] }
