memtable_capacity = 1024
memtable_buffer_count = 3
num_columns = 2
l0_file_limit = 5
write_stall_limit = 12
l1_base_bytes = 8192
level_size_multiplier = 7
max_level = 4
compaction_policy = "min_overlap"
block_cache_size = 256
base_file_size = 512
sst_bloom_filter_enabled = true
sst_bloom_bits_per_key = 11
sst_partitioned_index = true
ttl_enabled = true
default_ttl_seconds = 120
time_provider = "manual"
log_path = "/tmp/cobble.log"
log_max_file_size = 10485760
log_keep_files = 3
log_console = true
snapshot_on_flush = true
snapshot_retention = 3

reader.pin_partition_in_memory_count = 2
reader.block_cache_size = 2048
reader.reload_tolerance_seconds = 5

volumes[0].base_dir = "file:///tmp/cobble"
volumes[0].kinds = "primary_data_priority_high,meta"
