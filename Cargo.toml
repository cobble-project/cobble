[package]
name = "cobble"
version = "0.0.1"
edition = "2024"

[dependencies]
bytes = "1.11.0"
arc-swap = "1.7.1"
dashmap = "6.1.0"
foyer = "0.22.3"
log = "0.4.28"
log4rs = "1.3.0"
metrics = "0.22.3"
opendal = { version = "0.54.0", features = ["services-fs", "services-oss", "services-s3"] }
rand = "0.8.5"
serial_test = "3.3.1"
thiserror = "2.0.16"
tokio = { version = "1.49.0", features = ["rt", "rt-multi-thread", "macros"] }
url = "2.5.7"
uuid = { version = "1.18.0", features = ["v4"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.143"
