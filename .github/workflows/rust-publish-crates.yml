name: Publish Rust crates

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      COBBLE_WEB_MONITOR_SKIP_UI_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Validate release tag and crate versions
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ -z "${version}" ]]; then
            echo "Invalid release tag: ${tag}" >&2
            exit 1
          fi
          python3 - "${version}" <<'PY'
          import json
          import subprocess
          import sys
          
          release_version = sys.argv[1]
          publish_crates = ["cobble", "cobble-data-structure", "cobble-web-monitor", "cobble-cli"]
          
          metadata = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--no-deps", "--format-version", "1"],
                  text=True,
              )
          )
          versions_by_name = {pkg["name"]: pkg["version"] for pkg in metadata["packages"]}
          
          missing = [name for name in publish_crates if name not in versions_by_name]
          if missing:
              print(f"Missing crates in workspace metadata: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          
          mismatches = [
              f"{name}={versions_by_name[name]}"
              for name in publish_crates
              if versions_by_name[name] != release_version
          ]
          if mismatches:
              print(
                  f"Release tag version ({release_version}) does not match crate versions: {', '.join(mismatches)}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Publish crates to crates.io
        shell: bash
        run: |
          set -euo pipefail
          crates=(
            "cobble"
            "cobble-data-structure"
            "cobble-web-monitor"
            "cobble-cli"
          )

          publish_one() {
            local crate="$1"
            local attempts=8
            local delay=30
            local n=1
            while true; do
              set +e
              output="$(cargo publish -p "${crate}" --registry crates-io 2>&1)"
              code=$?
              set -e

              if [[ $code -eq 0 ]]; then
                echo "Published ${crate}."
                return 0
              fi
              if echo "${output}" | grep -qi "already uploaded"; then
                echo "${crate} is already uploaded. Continuing."
                return 0
              fi

              echo "${output}" >&2
              if [[ $n -ge $attempts ]]; then
                echo "Failed to publish ${crate} after ${attempts} attempts." >&2
                return 1
              fi
              n=$((n + 1))
              echo "Retrying ${crate} in ${delay}s (${n}/${attempts})..."
              sleep "${delay}"
            done
          }

          for crate in "${crates[@]}"; do
            publish_one "${crate}"
          done
