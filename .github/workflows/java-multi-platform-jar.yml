name: Build Java Multi-platform JAR

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-native:
    name: Build native ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            lib_file: libcobblejni.dylib
            use_zigbuild: "false"
          - platform: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            lib_file: libcobblejni.dylib
            use_zigbuild: "false"
          - platform: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_file: libcobblejni.so
            use_zigbuild: "false"
          - platform: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            lib_file: libcobblejni.so
            use_zigbuild: "true"
          - platform: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            lib_file: cobblejni.dll
            use_zigbuild: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig (for Linux aarch64 cross-build)
        if: matrix.use_zigbuild == 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild == 'true'
        shell: bash
        run: cargo install cargo-zigbuild --locked

      - name: Build debug + release JNI library
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use_zigbuild }}" == "true" ]]; then
            cargo zigbuild -p cobble-java --target "${{ matrix.target }}"
            cargo zigbuild -p cobble-java --target "${{ matrix.target }}" --release
          else
            cargo build -p cobble-java --target "${{ matrix.target }}"
            cargo build -p cobble-java --target "${{ matrix.target }}" --release
          fi

      - name: Stage native artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "native/${{ matrix.platform }}/debug"
          mkdir -p "native/${{ matrix.platform }}/release"
          cp "target/${{ matrix.target }}/debug/${{ matrix.lib_file }}" "native/${{ matrix.platform }}/debug/${{ matrix.lib_file }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.lib_file }}" "native/${{ matrix.platform }}/release/${{ matrix.lib_file }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v5
        with:
          name: native-${{ matrix.platform }}
          path: |
            native/${{ matrix.platform }}/debug/${{ matrix.lib_file }}
            native/${{ matrix.platform }}/release/${{ matrix.lib_file }}
          if-no-files-found: error

  build-jar:
    name: Assemble multi-platform jar
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean staged native resources
        run: rm -rf cobble-java/java/src/main/resources/native

      - name: Download all native artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: native-*
          merge-multiple: true
          path: cobble-java/java/src/main/resources

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Java jar (skip local native build)
        working-directory: cobble-java/java
        run: ./mvnw --quiet -DskipTests -Dexec.skip=true -Dcobble.skip.local.native.copy=true package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v5
        with:
          name: cobble-java-multi-platform-jar
          path: cobble-java/java/target/cobble-*.jar
          if-no-files-found: error

  publish-packages:
    name: Publish Maven packages
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build-native
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean staged native resources
        run: rm -rf cobble-java/java/src/main/resources/native

      - name: Download all native artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: native-*
          merge-multiple: true
          path: cobble-java/java/src/main/resources

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure Maven Central credentials
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${MAVEN_CENTRAL_USERNAME}</username>
                <password>${MAVEN_CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Set release version from tag
        working-directory: cobble-java/java
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          ./mvnw --quiet versions:set -DnewVersion="${TAG}" -DgenerateBackupPoms=false

      - name: Import GPG key
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${MAVEN_GPG_PRIVATE_KEY}" || -z "${MAVEN_GPG_PASSPHRASE}" ]]; then
            echo "Missing MAVEN_GPG_PRIVATE_KEY or MAVEN_GPG_PASSPHRASE secret." >&2
            exit 1
          fi
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          if ! printf '%s' "${MAVEN_GPG_PRIVATE_KEY}" | gpg --batch --import; then
            printf '%s' "${MAVEN_GPG_PRIVATE_KEY}" | base64 --decode | gpg --batch --import
          fi
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpg --batch --list-secret-keys --keyid-format LONG

      - name: Publish to Maven Central (Portal plugin)
        working-directory: cobble-java/java
        run: ./mvnw --batch-mode -Prelease-publish -Dgpg.passphrase="${MAVEN_GPG_PASSPHRASE}" -DskipTests -Dexec.skip=true -Dcobble.skip.local.native.copy=true deploy -s ~/.m2/settings.xml
