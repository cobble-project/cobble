name: Java CI

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/java-ci.yml"
      - "cobble-java/**"
      - "cobble/**"
      - "cobble-data-structure/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/java-ci.yml"
      - "cobble-java/**"
      - "cobble/**"
      - "cobble-data-structure/**"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  java-test:
    name: Java binding tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-java-ci-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-java-ci-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-java-ci-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-java-ci-cargo-git-

      - name: Check Java formatting
        working-directory: cobble-java/java
        run: ./mvnw --batch-mode --no-transfer-progress spotless:check

      - name: Run Java tests
        working-directory: cobble-java/java
        run: ./mvnw --batch-mode --no-transfer-progress test
